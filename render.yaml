services:
  # Backend FastAPI
  - type: web
    name: siswisp-backend
    runtime: docker
    plan: free
    dockerfilePath: ./siswisp_backend/Dockerfile
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./test.db
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: SECRET_KEY
        value: your-secret-key-change-in-production

  # Frontend React
  - type: web
    name: siswisp-frontend
    runtime: node
    plan: free
    rootDir: siswisp_frontend/siswisp-frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
