services:
  # Backend Flask
  - type: web
    name: siswisp-backend
    runtime: docker
    plan: free
    dockerfilePath: ./siswisp_backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./test.db
      - key: SECRET_KEY
        value: your-secret-key-change-in-production

  # Frontend React
  - type: web
    name: siswisp-frontend
    runtime: node
    plan: free
    rootDir: siswisp_frontend/siswisp-frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
