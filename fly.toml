# fly.io configuration for SISWISP Backend

app = "siswisp-backend"

[build]
  dockerfile = "siswisp_backend/Dockerfile"

[env]
  FLASK_ENV = "production"
  PYTHONUNBUFFERED = "true"

[[services]]
  internal_port = 10000
  processes = ["app"]
  protocol = "tcp"
  script_checks = []

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    timeout = "2s"
