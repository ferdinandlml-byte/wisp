name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd siswisp_backend/backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check syntax
      run: |
        cd siswisp_backend/backend
        python -m py_compile app/main.py
        python -m py_compile app/api/routes/flask_auth.py
        python -m py_compile app/api/routes/flask_clients.py
    
    - name: Verify Flask app starts
      run: |
        cd siswisp_backend/backend
        timeout 5 python run.py || true
      continue-on-error: true

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    
    - name: Install dependencies
      run: |
        cd siswisp_frontend/siswisp-frontend
        npm install
    
    - name: Build frontend
      run: |
        cd siswisp_frontend/siswisp-frontend
        npm run build
    
    - name: Check linting
      run: |
        cd siswisp_frontend/siswisp-frontend
        npm run lint 2>/dev/null || echo "No linter configured"
      continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./siswisp_backend/Dockerfile
        push: false
        tags: siswisp-backend:latest
